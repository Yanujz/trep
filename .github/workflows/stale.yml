name: Stale

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this is still relevant, please leave a comment or remove the `stale` label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            Please rebase or update if you intend to continue.
          close-issue-message: >
            This issue was closed automatically after 14 days of inactivity.
            Feel free to reopen it if the problem persists.
          close-pr-message: >
            This pull request was closed automatically after 14 days of inactivity.
            Please reopen and rebase if you wish to continue.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,in progress"
          exempt-pr-labels: "pinned,security,in progress"
