name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the feature and the problem it solves.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low — nice to have
        - Medium — would use regularly
        - High — blocking my use case
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What is missing or frustrating?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or examples that would help.
