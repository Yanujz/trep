version: 2

project_name: trep

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/trep
    binary: trep
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: trep
    repository:
      owner: Yanujz
      name: trep
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Yanujz/trep"
    description: "Convert test results and coverage data to rich self-contained HTML reports"
    license: "MIT"
    install: |
      bin.install "trep"
    test: |
      system "#{bin}/trep", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore(deps):"
      - "^Merge "

release:
  github:
    owner: Yanujz
    name: trep
  draft: false
  prerelease: auto
