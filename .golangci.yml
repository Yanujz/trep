version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Yanujz/trep

issues:
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
